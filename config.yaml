# English AI Videos Configuration
# ================================

# Video Generation Settings
video:
  # Background mode: "random" picks from enabled list, "fixed" uses default_background
  background_mode: "random"

  # Used when background_mode is "fixed"
  default_background: "photo_earth"

  # Backgrounds available for random selection
  # Photo-based backgrounds with Ken Burns animation (DALL-E 3 generated)
  enabled_backgrounds:
    - photo_earth
    - photo_city
    - photo_ocean
    - photo_nature
    - photo_abstract
    - photo_clouds
    - photo_sunset
    - photo_galaxy
    - photo_city_blur
    - photo_earth_dark
    - photo_ocean_vibrant

  # Video dimensions (TikTok vertical format)
  width: 1080
  height: 1920
  fps: 30

  # Animation style: clean_pop, energetic, karaoke
  animation_style: "clean_pop"

# Audio/TTS Settings
audio:
  # Provider: elevenlabs (primary), openai (fallback)
  provider: "elevenlabs"

  # Voice settings for ElevenLabs
  voice_id: "default"
  model: "eleven_v3"

  # Humanization settings
  global_speed: 1.0           # Natural speed — v3 handles pacing on its own
  stability: 0.50             # Balanced: human but no hallucinated artifacts
  similarity_boost: 0.80      # High fidelity to voice character
  style: 0.05                 # Minimal — prevents filler-sound artifacts
  speaker_boost: true         # Enhanced clarity for teaching
  humanize: true              # Add natural pauses and breathing

# Output Directories
output:
  videos: "output/video"
  audio: "output/audio"
  frames: "output/frames"

# Character Mascot (animated lip-sync)
character:
  enabled: true
  name: "owl"                 # Character folder under assets/characters/
  position_x: 50              # Bottom-left (avoids TikTok right-side buttons)
  position_y: 1500
  size: 280                   # Character size in pixels
  opacity: 0.92

# Upload Settings
upload:
  # Platforms to upload to (requires API keys in .env)
  platforms:
    - tiktok
    - youtube
    # - instagram  # Requires public video URL hosting (S3/CloudFlare)

  # Default hashtags per video type
  hashtags:
    educational: "#LearnEnglish #English #EnglishTips #AprendeInglés #Idiomas"
    quiz: "#EnglishQuiz #QuizTime #LearnEnglish #AprendeInglés"
    true_false: "#TrueOrFalse #EnglishQuiz #LearnEnglish #Idiomas"
    fill_blank: "#FillInTheBlank #EnglishPractice #LearnEnglish"
    pronunciation: "#Pronunciation #EnglishTips #SpeakEnglish"
    vocabulary: "#Vocabulary #EnglishWords #LearnEnglish"

# Content Generation
content:
  # Default video type: educational, quiz, true_false, fill_blank, pronunciation
  default_type: "educational"
